<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar sesión | MiniCRM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body {
        min-height: 100vh;
        background: linear-gradient(135deg, #58ff9e, #d1e7dd);
    }
    </style>
</head>

<body class="d-flex align-items-center">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-11 col-sm-8 col-md-4">

            <div class="card shadow-sm border-0">
                <div class="card-header bg-success text-white text-center">
                    <h4 class="mb-0">MiniCRM</h4>
                </div>

                <div class="card-body p-4">
                    <h5 class="text-center mb-3">Iniciar sesión</h5>

                    <form method="post">
                        {% csrf_token %}
                        {{ form.as_p }}

                        <button class="btn btn-success w-100 mt-3">
                            Entrar
                        </button>
                    </form>
                </div>
            </div>

            <p class="text-center text-muted mt-3 small">
                Gestión de clientes para autónomos y microempresas
            </p>

        </div>
    </div>
</div>

</body>
</html>
