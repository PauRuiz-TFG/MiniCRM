<!-- ACTIVIDADES -->
    <div class="card mt-4">
        <div class="card-header table-primary d-flex justify-content-between align-items-center">
            <strong>Actividad reciente</strong>
            <a href="{% url 'nueva_actividad' cliente.id %}" class="btn btn-sm btn-outline-light">
                <i class="fa fa-plus"></i> Añadir actividad
            </a>
        </div>
        <div class="card-body">
            {% if actividades %}
                <ul class="list-group list-group-flush">
                    {% for actividad in actividades %}
                    <li class="list-group-item">
                        <div class="d-flex justify-content-between align-items-center">


                            <div class="d-flex justify-content-between">
                                <div>
                                    <span class="badge bg-success me-2">
                                        {{ actividad.get_tipo_display }}
                                    </span>
                                    {{ actividad.descripcion }}
                                </div>
                            </div>

                            <div class="text-end">
                                <small class="text-muted me-3">
                                    {{ actividad.fecha|date:"d/m/Y H:i" }}
                                </small>
                                <a href="{% url 'editar_actividad' actividad.id %}" class="me-2 text-decoration-none">
                                    <i class="fa fa-edit"></i>
                                </a>
                                <a href="{% url 'eliminar_actividad' actividad.id %}" class="text-danger"
                                    onclick="return confirm('¿Eliminar actividad?');">
                                    <i class="fa fa-trash"></i>
                                </a>
                            </div>
    </div>
</li>






                    {% endfor %}
                </ul>
            {% else %}
                <div class="text-center text-muted">
                    No hay actividades registradas para este cliente
                </div>
            {% endif %}
        </div>
    </div>
