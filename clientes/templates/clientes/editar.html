{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        /* VERDE */
        .btn-primary,
        .table-primary {
            background-color: #198754;
            border-color: #198754;
            color: white;
        }

        .btn-outline-primary {
            background-color: transparent;
            color: #198754;
            border-color: #198754;
        }

        .btn-outline-primary:hover {
            background-color: #198754;
            color: white;
        }

        .form-control:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
        }

        .card {
            border: 1px solid #198754;
            box-shadow: 0 0 10px rgba(25, 135, 84, 0.15);
        }
    </style>
</head>

<body class="bg-light">
    <!-- Banner -->
    <header class="bg-success text-white py-3 mb-4 shadow-sm">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center">
                <img src="/static/img/logo.png" alt="Logo" style="height:40px;" class="me-2">
                <h4 class="mb-0">MiniCRM - Editar Cliente</h4>
            </div>
            <a href="{% url 'lista_clientes' %}" class="btn btn-outline-light btn-sm">
                <i class="fa fa-arrow-left me-1"></i> Volver
            </a>
        </div>
    </header>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <div class="container mt-4 bg-white p-4 shadow rounded" style="max-width: 600px;">
        <h2 class="text-center mb-4 text-success">Editar Cliente</h2>

        <form method="POST" class="needs-validation" novalidate>
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Nombre:</label>
                <input type="text" name="nombre" value="{{ cliente.nombre }}" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Teléfono:</label>
                <input type="text" name="telefono" value="{{ cliente.telefono }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Email:</label>
                <input type="email" name="email" value="{{ cliente.email }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Empresa:</label>
                <input type="text" name="empresa" value="{{ cliente.empresa }}" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Notas:</label>
                <textarea name="notas" rows="4" class="form-control">{{ cliente.notas }}</textarea>
            </div>

            <div class="d-flex justify-content-end">
                        <button type="submit" class="btn btn-primary">
                            <i class="fa fa-save me-1"></i> Actualizar
                        </button>
                    </div>
        </form>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
