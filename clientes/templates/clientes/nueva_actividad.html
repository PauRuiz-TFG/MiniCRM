{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Actividad</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        .btn-primary {
            background-color: #198754;
            border-color: #198754;
        }
        .card {
            border: 1px solid #198754;
            box-shadow: 0 0 10px rgba(25, 135, 84, 0.15);
        }
        .form-control:focus, .form-select:focus {
            border-color: #198754;
            box-shadow: 0 0 0 0.2rem rgba(25, 135, 84, 0.25);
        }
    </style>
</head>

<body class="bg-light">

<!-- Header -->
<header class="bg-success text-white py-3 mb-4 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <img src="{% static 'img/logo.png' %}" alt="Logo" style="height:40px;" class="me-2">
            <h4 class="mb-0">MiniCRM - Nueva Actividad</h4>
        </div>
        <a href="{% url 'detalles_cliente' cliente.id %}" class="btn btn-outline-light btn-sm">
            <i class="fa fa-arrow-left me-1"></i> Volver
        </a>
    </div>
</header>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-danger">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

<div class="container mt-4 bg-white p-4 shadow rounded" style="max-width: 600px;">
    <h2 class="text-center mb-4 text-success">Registrar Actividad</h2>

        <div class="card-body">
            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Tipo de actividad</label>
                    <select name="tipo" class="form-select" required>
                        <option value="LLAMADA">Llamada</option>
                        <option value="EMAIL">Email</option>
                        <option value="REUNION">Reunión</option>
                        <option value="OTRO">Otro</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea name="descripcion" class="form-control" rows="3" required></textarea>
                </div>

                <div class="text-end">
                    <button class="btn btn-primary">
                        <i class="fa fa-save me-1"></i> Guardar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
